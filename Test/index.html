<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive 3D Gesture Particle System</title>
<style>
body { margin:0; overflow:hidden; background:black; }
video { display:none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene, camera, renderer, particles;
let particleSystem;
let currentShape = "heart";
let expansion = 1;
let hue = 0;

init();
initHandTracking();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    createParticles();
}

function createParticles() {
    if (particleSystem) scene.remove(particleSystem);

    const geometry = new THREE.BufferGeometry();
    const count = 3000;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        let p = generateShapePoint(currentShape);
        positions[i*3] = p.x;
        positions[i*3+1] = p.y;
        positions[i*3+2] = p.z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        size: 0.05,
        vertexColors:false,
        color: new THREE.Color(`hsl(${hue},100%,60%)`)
    });

    particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);
}

function generateShapePoint(shape) {
    const t = Math.random() * Math.PI * 2;

    switch(shape) {
        case "heart":
            const x = 16 * Math.pow(Math.sin(t),3);
            const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            return {x:x/20, y:y/20, z:(Math.random()-0.5)/5};

        case "flower":
            const r = Math.sin(6*t);
            return {x:r*Math.cos(t), y:r*Math.sin(t), z:(Math.random()-0.5)/5};

        case "saturn":
            const angle = Math.random()*Math.PI*2;
            const radius = 1 + Math.random()*0.3;
            return {x:Math.cos(angle)*radius, y:(Math.random()-0.5)/3, z:Math.sin(angle)*radius};

        case "fireworks":
            const theta = Math.random()*Math.PI*2;
            const phi = Math.random()*Math.PI;
            const rad = Math.random()*1.5;
            return {
                x: rad*Math.sin(phi)*Math.cos(theta),
                y: rad*Math.sin(phi)*Math.sin(theta),
                z: rad*Math.cos(phi)
            };
    }
}

function animate() {
    requestAnimationFrame(animate);

    if (particleSystem) {
        particleSystem.rotation.y += 0.002;
        particleSystem.scale.set(expansion, expansion, expansion);
        particleSystem.material.color.setHSL(hue/360,1,0.6);
    }

    renderer.render(scene, camera);
}

function initHandTracking() {
    const videoElement = document.getElementById('video');

    const hands = new Hands({
        locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults(results => {
        if (results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];

            const thumb = landmarks[4];
            const index = landmarks[8];

            const dx = thumb.x - index.x;
            const dy = thumb.y - index.y;
            const distance = Math.sqrt(dx*dx + dy*dy);

            expansion = 1 + (0.3 - distance) * 5;
            expansion = Math.max(0.5, Math.min(3, expansion));

            const open = landmarks[8].y < landmarks[6].y;
            if (open) hue = (hue + 2) % 360;

            const fingersUp = countFingers(landmarks);

            if (fingersUp === 1) currentShape = "heart";
            else if (fingersUp === 2) currentShape = "flower";
            else if (fingersUp === 3) currentShape = "saturn";
            else if (fingersUp >= 4) currentShape = "fireworks";

            createParticles();
        }
    });

    const cameraFeed = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 640,
        height: 480
    });
    cameraFeed.start();
}

function countFingers(landmarks) {
    let count = 0;
    if (landmarks[8].y < landmarks[6].y) count++;
    if (landmarks[12].y < landmarks[10].y) count++;
    if (landmarks[16].y < landmarks[14].y) count++;
    if (landmarks[20].y < landmarks[18].y) count++;
    return count;
}

</script>
</body>
</html>
